# Site settings
title: PaPa-jun's Blog
header-img: "img/autumn2.jpg" 
description: "斯人若彩虹，遇上方知有。"  
baseurl: ""
# url: "http://azeril.me"  
# url: "http://localhost:4000"

url: http://azeril.com

# enforce_ssl: 

# About/contact
owner: 
  name: "Yufengpeng"
  email: pengyufeng2003@outlook.com
  bio: "路漫漫其修远兮，吾将上下而求索。"

# Data

# gavatar: 
favicon: img/favicon.ico
github_username: PaPa-jun  

# Build settings  

# use Github Flavored Markdown !important  
# document: http://jekyllrb.com/docs/configuration/#kramdown  

markdown: kramdown
kramdown:
  input: GFM
highlighter: rouge

gems: 
- jekyll-paginate
# - jekyll-gallery-generator 
permalink: none
paginate: 8
paginate_path: "Home/page:num"
exclude: ["less","node_modules","Gruntfile.js","package.json","README.md"]

# http://en.wikipedia.org/wiki/List_of_tz_database_time_zones
timezone: Asia/Shanghai

# Title


# Defaults for posts
defaults:
  -
    scope: 
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "PaPa_jun"
      header-img: "img/fantasy.jpg" # We don't want posts without a header image, that whould mean white on white
  -
    scope:
      path: assets
    value:
      pdf: true


# Comments 
comments :
  provider : disqus
  disqus :
      short_name : Azeril

# Analytics and webmaster tools stuff goes here
google_analytics: UA-66863061-1
google_verify:
# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

